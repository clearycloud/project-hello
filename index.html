```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8층 엘리베이터 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 현재 위치 선택 -->
    <div id="current-floor-board">
        <span class="board-label">CURRENT FLOOR</span>
        <select id="floor-picker">
            <option value="1">1F</option>
            <option value="2">2F</option>
            <option value="3">3F</option>
            <option value="4" selected>4F</option>
            <option value="5">5F</option>
            <option value="6">6F</option>
            <option value="7">7F</option>
            <option value="8">8F</option>
        </select>
    </div>

    <!-- 전체 레이아웃 -->
    <div class="main-layout">

        <!-- 엘리베이터 패널 -->
        <div class="elevator-panel">

            <div class="screw top"></div>

            <div class="black-screen">
                <div class="led-arrow" id="display-arrow">─</div>
                <div class="led-number" id="display-number">01</div>
                <div class="led-timer" id="display-timer"></div>
            </div>

            <div class="button-set">
                <button id="btn-up" class="elevator-physical-btn" aria-label="Up">
                    <div class="btn-inner">
                        <svg viewBox="0 0 100 100">
                            <polygon points="50,25 85,75 15,75"/>
                        </svg>
                    </div>
                </button>

                <button id="btn-down" class="elevator-physical-btn" aria-label="Down">
                    <div class="btn-inner">
                        <svg viewBox="0 0 100 100">
                            <polygon points="15,25 85,25 50,75"/>
                        </svg>
                    </div>
                </button>
            </div>

            <div class="screw bottom"></div>

        </div>

        <!-- 정차층 패널 -->
        <div id="stop-panel">

            <div class="stop-title">
                STOP
            </div>

            <button class="stop-floor-btn" data-floor="2">2F</button>
            <button class="stop-floor-btn" data-floor="3">3F</button>
            <button class="stop-floor-btn" data-floor="4">4F</button>
            <button class="stop-floor-btn" data-floor="5">5F</button>
            <button class="stop-floor-btn" data-floor="6">6F</button>
            <button class="stop-floor-btn" data-floor="7">7F</button>
            <button class="stop-floor-btn" data-floor="8">8F</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
```
